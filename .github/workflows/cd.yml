# ================================================================
# CD — Continuous Deployment
# ================================================================
# Triggered on push to main (after CI passes).
#
# Current stage:  PoC / Supabase
# Target stage:   AWS (ECS Fargate + RDS)
#
# Branching strategy:
#   main      → production  (protected, requires PR + CI green)
#   develop   → staging     (integration branch)
#   feature/* → PRs to develop
#
# ── PoC deployment (Railway / Render) ─────────────────────────
# Uncomment and configure the relevant section below once you
# have a hosting account and secrets set up.
#
# ── AWS target deployment (ECS) ───────────────────────────────
# See the AWS section below for the ECS push workflow.
# ================================================================

name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:         # allow manual trigger from GitHub UI

permissions:
  contents: read
  packages: write

jobs:

  # ── Build & push Docker image ─────────────────────────────────
  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Option A: GitHub Container Registry (free) ──────────
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy ────────────────────────────────────────────────────
  # Railway deploys automatically via its GitHub integration when this CD job succeeds.
  # In Railway dashboard → service Settings → "Wait for CI" must be ON so Railway only
  # deploys after all GitHub Actions complete successfully.
  #
  # For future AWS migration, add ECS deploy steps here.
  # See DEPLOY.md → "Migrating to AWS" for details.
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      # ── Railway ───────────────────────────────────────────────
      # No explicit deploy step needed. Railway watches the main branch and
      # deploys automatically once this workflow (and CI) completes successfully.
      # (Railway service Settings → "Wait for CI" = ON enforces this gate.)
      - name: Confirm deployment triggered
        run: |
          echo "Image ${{ needs.build-and-push.outputs.image-tag }} pushed to GHCR."
          echo "Railway will deploy automatically after all checks pass."

      # ── Option C: AWS ECS (FUTURE — not active, do not uncomment yet) ───
      # Only activate this when AWS infrastructure (ECS + RDS) is fully set up.
      # See DEPLOY.md → "Migrating to AWS" for the full migration steps.
      # Requires: AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_REGION secrets
      #           ECS_CLUSTER_NAME, ECS_SERVICE_NAME, ECS_TASK_DEFINITION
