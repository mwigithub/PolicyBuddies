name: Deploy Supabase Schema

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "db/schema.sql"
      - "scripts/db-bootstrap.mjs"
      - "scripts/db-healthcheck.mjs"
      - ".github/workflows/supabase-deploy.yml"

permissions:
  contents: read

jobs:
  supabase-migrate:
    name: Apply Schema + Verify
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DATABASE_URL: ${{ secrets.SUPABASE_DATABASE_URL }}
      DATABASE_SSL: "true"
      DATABASE_POOL_MAX: "5"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Validate DB secret is set
        run: |
          if [ -z "${DATABASE_URL}" ]; then
            echo "Missing SUPABASE_DATABASE_URL secret"
            exit 1
          fi

      - name: Apply schema to Supabase
        run: npm run db:bootstrap

      - name: Verify pgvector + required tables
        run: npm run db:healthcheck
