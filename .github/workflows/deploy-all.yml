name: Deploy All (DB + API)

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  preflight:
    name: Preflight Secrets Check
    runs-on: ubuntu-latest
    steps:
      - name: Validate required secrets
        run: |
          [ -n "${{ secrets.SUPABASE_DATABASE_URL }}" ] || (echo "Missing secret: SUPABASE_DATABASE_URL" && exit 1)
          [ -n "${{ secrets.RAILWAY_TOKEN }}" ] || (echo "Missing secret: RAILWAY_TOKEN" && exit 1)
          if [ -z "${{ secrets.API_BASE_URL }}" ]; then
            echo "API_BASE_URL is not set. Deploy will continue; smoke test will be skipped."
          fi

  migrate-supabase:
    name: Migrate Supabase
    runs-on: ubuntu-latest
    needs: preflight
    env:
      DATABASE_URL: ${{ secrets.SUPABASE_DATABASE_URL }}
      DATABASE_SSL: "true"
      DATABASE_POOL_MAX: "5"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Apply schema
        run: npm run db:bootstrap

      - name: Verify schema health
        run: npm run db:healthcheck

  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: migrate-supabase
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-api:
    name: Deploy API (Railway)
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Railway
        uses: berviantoleo/railway-deploy@main
        with:
          railway_token: ${{ secrets.RAILWAY_TOKEN }}

  smoke-test:
    name: Post-Deploy Smoke Test
    runs-on: ubuntu-latest
    needs: deploy-api
    if: ${{ secrets.API_BASE_URL != '' }}
    steps:
      - name: Health endpoint
        run: |
          curl -fsS "${{ secrets.API_BASE_URL }}/api/health" | jq .
