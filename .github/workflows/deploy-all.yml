name: Deploy All (DB + API)

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  preflight:
    name: Preflight Secrets Check
    runs-on: ubuntu-latest
    steps:
      - name: Validate required secrets
        run: |
          [ -n "${{ secrets.SUPABASE_DATABASE_URL }}" ] || (echo "Missing secret: SUPABASE_DATABASE_URL" && exit 1)
          [ -n "${{ secrets.RAILWAY_TOKEN }}" ] || (echo "Missing secret: RAILWAY_TOKEN" && exit 1)
          if [ -z "${{ secrets.RAILWAY_PROJECT_ID }}" ] && [ -z "${{ secrets.RAILWAY_PROJECT_NAME }}" ]; then
            echo "Missing Railway project selector: set RAILWAY_PROJECT_ID or RAILWAY_PROJECT_NAME"
            exit 1
          fi
          if [ -z "${{ secrets.RAILWAY_SERVICE_ID }}" ] && [ -z "${{ secrets.RAILWAY_SERVICE_NAME }}" ]; then
            echo "Missing Railway service selector: set RAILWAY_SERVICE_ID or RAILWAY_SERVICE_NAME"
            exit 1
          fi
          if [ -z "${{ secrets.API_BASE_URL }}" ]; then
            echo "API_BASE_URL is not set. Deploy will continue; smoke test will be skipped."
          fi

  migrate-supabase:
    name: Migrate Supabase
    runs-on: ubuntu-latest
    needs: preflight
    env:
      DATABASE_URL: ${{ secrets.SUPABASE_DATABASE_URL }}
      DATABASE_SSL: "true"
      DATABASE_POOL_MAX: "5"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Apply schema
        run: npm run db:bootstrap

      - name: Verify schema health
        run: npm run db:healthcheck

  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: migrate-supabase
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-api:
    name: Deploy API (Railway)
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
      RAILWAY_SERVICE_ID: ${{ secrets.RAILWAY_SERVICE_ID }}
      RAILWAY_PROJECT_NAME: ${{ secrets.RAILWAY_PROJECT_NAME }}
      RAILWAY_SERVICE_NAME: ${{ secrets.RAILWAY_SERVICE_NAME }}
      RAILWAY_ENVIRONMENT_NAME: ${{ secrets.RAILWAY_ENVIRONMENT_NAME }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Railway CLI
        run: npm i -g @railway/cli

      - name: Deploy to Railway via CLI
        run: |
          if [ -n "${RAILWAY_PROJECT_ID}" ]; then
            PROJECT_FLAG="--project ${RAILWAY_PROJECT_ID}"
          else
            PROJECT_FLAG="--project ${RAILWAY_PROJECT_NAME}"
          fi

          if [ -n "${RAILWAY_SERVICE_ID}" ]; then
            SERVICE_FLAG="--service ${RAILWAY_SERVICE_ID}"
          else
            SERVICE_FLAG="--service ${RAILWAY_SERVICE_NAME}"
          fi

          if [ -n "${RAILWAY_ENVIRONMENT_NAME}" ]; then
            ENV_FLAG="--environment ${RAILWAY_ENVIRONMENT_NAME}"
          else
            ENV_FLAG="--environment production"
          fi

          railway up ${PROJECT_FLAG} ${SERVICE_FLAG} ${ENV_FLAG} --ci

  smoke-test:
    name: Post-Deploy Smoke Test
    runs-on: ubuntu-latest
    needs: deploy-api
    env:
      API_BASE_URL: ${{ secrets.API_BASE_URL }}
    steps:
      - name: Skip when API_BASE_URL is missing
        if: ${{ env.API_BASE_URL == '' }}
        run: echo "API_BASE_URL is not set. Skipping smoke test."

      - name: Health endpoint
        if: ${{ env.API_BASE_URL != '' }}
        run: |
          curl -fsS "${API_BASE_URL}/api/health" | jq .
