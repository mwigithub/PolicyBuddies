# ================================================================
# CI — Continuous Integration
# ================================================================
# Runs on every push and pull request to main / develop.
#
# Jobs:
#   lint        — syntax check all JS source files
#   docker      — build the Docker image (verifies Dockerfile is valid)
#   integration — spin up postgres + api via docker compose and
#                 hit /api/health to confirm the full stack works
# ================================================================

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:

  # ── Syntax / Lint ─────────────────────────────────────────────
  lint:
    name: Lint & Syntax Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Check JS syntax (all source files)
        run: |
          find src -name "*.js" | xargs -I{} node --input-type=module --check < {}

  # ── Docker Build ──────────────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: policybuddies:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Integration Test ──────────────────────────────────────────
  integration:
    name: Integration Test (full stack)
    runs-on: ubuntu-latest
    needs: [lint, docker]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create .env for compose
        run: |
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> .env
          echo "ALLOWED_ORIGIN=*" >> .env

      - name: Start full stack
        run: docker compose up -d --build
        timeout-minutes: 5

      - name: Wait for API to be healthy
        run: |
          echo "Waiting for API..."
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/api/health || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "API is up (attempt $i)"
              break
            fi
            echo "Attempt $i: HTTP $STATUS — retrying in 5s..."
            sleep 5
          done
          [ "$STATUS" = "200" ] || (echo "API failed to start" && exit 1)

      - name: Verify API endpoints
        run: |
          curl -sf http://localhost:3000/api/health   | jq '.status'
          curl -sf http://localhost:3000/api/catalog  | jq '.success'
          curl -sf http://localhost:3000/api/config   | jq '.config.vectorStoreProvider'

      - name: Dump logs on failure
        if: failure()
        run: docker compose logs

      - name: Tear down
        if: always()
        run: docker compose down -v
